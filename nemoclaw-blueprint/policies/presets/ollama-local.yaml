preset:
  name: ollama-local
  description: "Direct access to host Ollama API for Claude Code Anthropic Messages API"

network_policies:
  ollama_local:
    name: ollama_local
    endpoints:
      - host: host.openshell.internal
        port: 11434
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: "*"
              path: "/**"
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/curl }
